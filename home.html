<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Visualización de la Información</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
        }
        .left {
            flex: 1;
            padding-right: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .quote {
            font-size: 1.5em;
            font-style: italic;
            margin-bottom: 20px;
        }
        .author {
            font-weight: bold;
            text-align: right;
        }
        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="left">
        <div class="quote">
            "La excelencia gráfica es aquella que brinda al observador el mayor número de ideas en el menor tiempo, con la menor cantidad de tinta, en el menor espacio."
        </div>
        <div class="author">
            - Edward Tufte
        </div>
    </div>
    <div class="right">
        <img src="./imagenes/poster_networks.jpg" alt="Poster Networks" />
        <h2 style="font-size: small; margin-top: 10px;">Network visualization (<a href="https://cambridge-intelligence.com/why-visualize-networks/" style="color: #66ff66; font-size: small;">https://cambridge-intelligence.com/why-visualize-networks/</a>)</h2>
    </div>
</body>
</html>
