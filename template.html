<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #title {
            flex: 0 0 auto;
            text-align: center;
            background-color: #000000;
            padding: 10px;
            font-size: 2em;
        }
        #main {
            display: flex;
            flex: 1;
        }
        #sidebar {
            flex: 0 0 auto;
            background-color: #000000;
            padding: 20px;
        }
        #content {
            flex: 1;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #footer {
            flex: 0 0 auto;
            text-align: center;
            background-color: #000000;
            padding: 10px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        .submenu {
            margin-left: 20px;
        }
        a {
            color: #66ff66;
            text-decoration: none;
        }
        #sidebar > ul > li {
            font-weight: bold;
        }
        .submenu li {
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div id="title">
        <h1>Visualización de la Información</h1>
    </div>
    <div id="main">
        <div id="sidebar">
            <ul>
                <li><a href="intro_personal.html" target="contentFrame">Intro Personal</a></li>
                <li>Clases
                    <ul class="submenu">
                        <li><a href="clase1.html" target="contentFrame">Clase 1</a></li>
                        <li><a href="#" target="contentFrame">Clase 2</a></li>
                        <li><a href="#" target="contentFrame">Clase 3</a></li>
                        <li><a href="#" target="contentFrame">Clase 4</a></li>
                        <li><a href="#" target="contentFrame">Clase 5</a></li>
                        <li><a href="#" target="contentFrame">Clase 6</a></li>
                        <li><a href="#" target="contentFrame">Clase 7</a></li>
                        <li><a href="#" target="contentFrame">Clase 8</a></li>
                    </ul>
                </li>
                <li>TPs
                    <ul class="submenu">
                        <li><a href="#" target="contentFrame">TP 1</a></li>
                        <li><a href="#" target="contentFrame">TP 2</a></li>
                    </ul>
                </li>
            </ul>
        </div>
        <div id="content">
            <iframe src="intro_personal.html" name="contentFrame"></iframe>
        </div>
    </div>
    <div id="footer">
        <p>ITBA - Maestría en Ciencia de Datos - Marzo 2026</p>
    </div>
</body>
</html>
